name: ci

# Runs on Blacksmith runners; requires the blacksmith.sh GitHub App installed on
# this repo (https://app.blacksmith.sh), or these jobs queue with no runner.
# Cheap checks on Linux only (fmt + clippy + tests), run on pull requests so
# code is validated before it reaches main. The expensive 3-OS release
# binaries are built separately by release.yml on version tags.
on:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain and libraries
        run: |
          pacman -Syu --noconfirm --needed \
            rust cargo pkgconf clang ffmpeg \
            alsa-lib libxkbcommon wayland libx11 libxcursor libxi libxrandr libglvnd
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --workspace
