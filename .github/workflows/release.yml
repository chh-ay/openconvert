name: release

# Per-OS native builds, then a published GitHub Release with the binaries.
# Cross-compiling a static FFmpeg from one host is impractical, so each target
# builds on its own runner. Linux/Arch links the system libav (the distro ships
# it); macOS and Windows embed libav because those systems have no libav.
on:
  workflow_dispatch:
    inputs:
      only:
        description: "Build a single OS for testing (build-only; never publishes)"
        type: choice
        default: all
        options:
          - all
          - linux
          - macos
          - windows
  push:
    tags:
      - "v*"

jobs:
  linux-arch:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'linux' }}
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain and runtime libraries
        run: |
          pacman -Syu --noconfirm --needed \
            rust cargo pkgconf clang ffmpeg \
            alsa-lib libxkbcommon wayland libx11 libxcursor libxi libxrandr libglvnd
      - uses: Swatinem/rust-cache@v2
      - name: Build (dynamic libav)
        run: cargo build -p openconvert-app --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: openconvert-linux-x86_64
          path: target/release/openconvert-app

  macos:
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'macos' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build tools and GPL codecs
        run: brew install nasm pkg-config x264 x265 libvpx opus lame
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          # Salt: FFmpeg is only reconfigured when its build dir is absent, so
          # configure-flag changes need a fresh cache to take effect.
          key: static-link-v3
      - name: Build (static libav and codecs)
        run: |
          # Static codec archives live in the Homebrew prefix; rustc must see
          # that path when the build script emits `-l static=<codec>`.
          export RUSTFLAGS="-L native=$(brew --prefix)/lib"
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          export CPATH="$(brew --prefix)/include"
          export LIBRARY_PATH="$(brew --prefix)/lib"
          cargo build -p openconvert-app --release --locked --features static-ffmpeg
      - name: Verify no Homebrew codec dylibs are required
        run: |
          unresolved=0
          while IFS= read -r line; do
            case "$line" in
              */opt/homebrew/* | */usr/local/opt/* | */usr/local/Cellar/*)
                printf 'Unexpected Homebrew runtime dependency: %s\n' "$line"
                unresolved=1
                ;;
            esac
          done < <(otool -L target/release/openconvert-app)

          if [ "$unresolved" -ne 0 ]; then
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: openconvert-macos
          path: target/release/openconvert-app

  windows:
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == 'all' || inputs.only == 'windows' }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git make diffutils nasm yasm
            mingw-w64-x86_64-toolchain mingw-w64-x86_64-rust
            mingw-w64-x86_64-clang mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-libx264 mingw-w64-x86_64-x265 mingw-w64-x86_64-libvpx
            mingw-w64-x86_64-opus mingw-w64-x86_64-lame
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          # Salt: FFmpeg is only reconfigured when its build dir is absent, so
          # configure-flag changes need a fresh cache to take effect.
          key: static-link-v3
      - name: Build (static libav and codecs)
        env:
          BINDGEN_EXTRA_CLANG_ARGS_x86_64_pc_windows_gnu: --target=x86_64-pc-windows-gnu
        run: |
          # The build script emits `-l static=<codec>`, which makes rustc itself
          # locate lib<codec>.a — and the native rustc cannot resolve the POSIX
          # path /mingw64/lib, so hand it the Windows form. crt-static folds in
          # libgcc/libwinpthread so no MinGW runtime DLLs remain either.
          export RUSTFLAGS="-C target-feature=+crt-static -L native=$(cygpath -m /mingw64/lib)"
          cargo build -p openconvert-app --release --locked --features static-ffmpeg
      - name: Verify no MinGW runtime DLLs are required
        run: |
          unresolved=0
          while IFS= read -r line; do
            case "$line" in
              *"=> not found"*)
                case "$line" in
                  *"api-ms-"*.dll* | *"ext-ms-"*.dll*)
                    ;;
                  *)
                    printf 'Unresolved runtime dependency: %s\n' "$line"
                    unresolved=1
                    ;;
                esac
                ;;
              *"=> /mingw64/bin/"*.dll*)
                printf 'Unexpected dynamic MinGW dependency: %s\n' "$line"
                unresolved=1
                ;;
            esac
          done < <(ntldd target/release/openconvert-app.exe)

          if [ "$unresolved" -ne 0 ]; then
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: openconvert-windows-x86_64
          path: target/release/openconvert-app.exe

  publish:
    needs: [linux-arch, macos, windows]
    # Publish whatever built, even if one OS fails, on tag pushes only.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage release binaries
        run: |
          mkdir -p release
          cp artifacts/openconvert-linux-x86_64/openconvert-app release/openconvert-linux-x86_64 || true
          cp artifacts/openconvert-macos/openconvert-app release/openconvert-macos || true
          cp artifacts/openconvert-windows-x86_64/openconvert-app.exe release/openconvert-windows-x86_64.exe || true
          ls -l release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
